name: Build MINOS SIGINT APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:          # allows manual trigger from the Actions tab

jobs:
  build-apk:
    runs-on: ubuntu-22.04     # 22.04 is more stable than latest for buildozer

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Java (NDK r25b requires Java 17, NOT 21) ───────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 4. System deps required by Buildozer / p4a / OpenCV compile ────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip \
            build-essential ccache \
            autoconf automake libtool \
            pkg-config \
            cmake \
            zlib1g-dev \
            libffi-dev \
            libssl-dev \
            libltdl-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libbz2-dev \
            lzma liblzma-dev \
            python3-dev \
            libsqlite3-dev

      # ── 5. Python build tools ──────────────────────────────────────────────
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==3.0.11
          pip install buildozer==1.5.0

      # ── 6. Cache ~/.buildozer to speed up subsequent runs ─────────────────
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}-v1
          restore-keys: |
            ${{ runner.os }}-buildozer-

      # ── 7. Build debug APK ─────────────────────────────────────────────────
      # Note: OpenCV cross-compilation for Android takes ~20-35 min on first run.
      # Subsequent runs are fast thanks to the cache above.
      - name: Build debug APK
        run: |
          buildozer android debug 2>&1 | tee build.log
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      # ── 8. Upload the APK as a downloadable artifact ──────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MINOS-SIGINT-${{ github.sha }}-debug
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30

      # ── 9. Always upload build log (useful on failure) ────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.sha }}
          path: build.log
          if-no-files-found: ignore

name: Build MINOS SIGINT APK
 
on:
  push:
    branches: [ main ]
  workflow_dispatch:
 
jobs:
  build-apk:
    runs-on: ubuntu-22.04
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
 
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip \
            build-essential ccache \
            autoconf automake libtool \
            pkg-config cmake \
            zlib1g-dev libffi-dev libssl-dev \
            libltdl-dev libncurses5-dev \
            libbz2-dev lzma liblzma-dev \
            python3-dev libsqlite3-dev
 
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==3.0.11
          pip install buildozer==1.5.0
 
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}-v1
          restore-keys: |
            ${{ runner.os }}-buildozer-
 
      # ── FIX: pre-accept Android SDK licenses ──────────────────────────────
      # sdkmanager asks "Accept? (y/N)" interactively — in CI nothing answers
      # so it skips build-tools and the build breaks.
      # Two-layer fix:
      #   1. Copy already-accepted licenses from the GitHub runner's own SDK
      #   2. yes | pipes "y" to any remaining interactive prompts
      - name: Build debug APK
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          if [ -d "$ANDROID_HOME/licenses" ]; then
            cp -f "$ANDROID_HOME/licenses/"* \
              ~/.buildozer/android/platform/android-sdk/licenses/ 2>/dev/null || true
          fi
          yes | buildozer android debug 2>&1 | tee build.log
 
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MINOS-SIGINT-${{ github.sha }}-debug
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
 
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.sha }}
          path: build.log
          if-no-files-found: ignore
 
